services:
  # App Backend (Build dari Dockerfile lokal)
  # app:
  #   build: .
  #   ports:
  #     - "3000:3000"
  #     - "8080:80"
  #   environment:
  #     - PORT=3000
  #     - INFO_APP_OWNER=Sensei
  #     - DATABASE_URL=postgresql://postgres:postgres_pass@postgres:5432/citizen_db
  #     - S3_ENDPOINT=http://minio:9000
  #     - S3_ACCESS_KEY=minio_admin
  #     - S3_SECRET_KEY=minio_secret_pass
  #     - S3_BUCKET=reports
  #     - S3_REGION=us-east-1
  #     - DISCORD_WEBHOOK_URL=
  #   depends_on:
  #     - postgres
  #     - minio
  #     - minio-createbucket

  # Database PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
      POSTGRES_DB: citizen_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Object Storage MinIO
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_pass
    volumes:
      - miniodata:/data

  # Create MinIO Bucket automatically
  minio-createbucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minio_admin minio_secret_pass;
      /usr/bin/mc mb myminio/reports || true;
      /usr/bin/mc anonymous set public myminio/reports;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
